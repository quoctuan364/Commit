name: Guaranteed Dynamic Daily Updates (Min 5 - Max 10)

on:
  schedule:
    - cron: '0 * * * *' # Scheduled hourly (will run as often as GitHub allows)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  random-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dynamic Pacing and Tie-Breaker Engine
        id: gatekeeper
        run: |
          # Fetch repository variables
          YESTERDAY_TOTAL=$(gh api repos/${{ github.repository }}/actions/variables/YESTERDAY_TOTAL --jq '.value' 2>/dev/null || echo "0")
          TODAY_COUNT=$(gh api repos/${{ github.repository }}/actions/variables/TODAY_COUNT --jq '.value' 2>/dev/null || echo "0")
          
          # Convert current UTC hour to an integer (0 to 23)
          CURRENT_HOUR=$(date -u +'%1H')
          [ -z "$CURRENT_HOUR" ] && CURRENT_HOUR=0
          HOURS_LEFT=$((23 - CURRENT_HOUR))
          
          echo "Time check: Current hour is $CURRENT_HOUR UTC. Hours remaining in day: $HOURS_LEFT"
          echo "History check: Yesterday's total = $YESTERDAY_TOTAL | Today's current count = $TODAY_COUNT"
          
          # 1. Midnight Reset
          if [ "$CURRENT_HOUR" -eq 0 ]; then
            TODAY_COUNT=0
            gh api --method PATCH repos/${{ github.repository }}/actions/variables/TODAY_COUNT -f value="0"
          fi
          
          SHOULD_COMMIT="false"
          MIN_TARGET=5
          MAX_TARGET=10
          
          # 2. Pacing Logic to GUARANTEE at least 5 commits
          # If the number of hours left matches or is less than the commits we still need, FORCE IT.
          COMMITS_NEEDED=$((MIN_TARGET - TODAY_COUNT))
          if [ $COMMITS_NEEDED -gt 0 ] && [ $HOURS_LEFT -le $COMMITS_NEEDED ]; then
            echo "Pacing Trigger: Forcing commit to guarantee the minimum target of $MIN_TARGET."
            SHOULD_COMMIT="true"
          
          # 3. Random Logic if we haven't reached the absolute cap of 10
          elif [ $TODAY_COUNT -l t $MAX_TARGET ]; then
            ROLL=$((1 + RANDOM % 100))
            # Higher base chance (40%) to offset missed GitHub schedules
            if [ $ROLL -le 40 ]; then
              echo "Random Trigger: Lucky roll ($ROLL <= 40)!"
              SHOULD_COMMIT="true"
            fi
          fi
          
          # 4. End-of-Day Strict Tie-Breaker (At 11 PM UTC / Hour 23)
          # If this is the final hour and today's total equals yesterday's, force a divergence
          FUTURE_TOTAL=$TODAY_COUNT
          if [ "$SHOULD_COMMIT" == "true" ]; then
            FUTURE_TOTAL=$((TODAY_COUNT + 1))
          fi
          
          if [ "$CURRENT_HOUR" -eq 23 ] && [ $FUTURE_TOTAL -eq $YESTERDAY_TOTAL ]; then
            echo "Tie-Breaker Trigger: Today's projected total matches yesterday ($YESTERDAY_TOTAL). Adjusting..."
            if [ $FUTURE_TOTAL -eq $TODAY_COUNT ]; then
              # It was false, force it true to increment total
              if [ $FUTURE_TOTAL -lt $MAX_TARGET ]; then
                SHOULD_COMMIT="true"
                FUTURE_TOTAL=$((FUTURE_TOTAL + 1))
              fi
            else
              # It was true, force it false to prevent incrementing
              if [ $FUTURE_TOTAL -gt $MIN_TARGET ]; then
                SHOULD_COMMIT="false"
                FUTURE_TOTAL=$TODAY_COUNT
              fi
            fi
          fi
          
          # 5. Execution & Variable Updates
          if [ "$SHOULD_COMMIT" == "true" ]; then
            NEW_COUNT=$((TODAY_COUNT + 1))
            gh api --method PATCH repos/${{ github.repository }}/actions/variables/TODAY_COUNT -f value="$NEW_COUNT"
            echo "Decision: Commit APPROVED. New count for today will be: $NEW_COUNT"
          else
            echo "Decision: Commit SKIPPED this hour."
          fi
          
          # Lock yesterday's total variable when ending the day
          if [ "$CURRENT_HOUR" -eq 23 ]; then
            gh api --method PATCH repos/${{ github.repository }}/actions/variables/YESTERDAY_TOTAL -f value="$FUTURE_TOTAL"
            echo "Day ended. Saving final score ($FUTURE_TOTAL) into YESTERDAY_TOTAL."
          fi
          
          echo "should_run=$SHOULD_COMMIT" >> $GITHUB_OUTPUT

      - name: Overwrite README content with Date and Time
        if: steps.gatekeeper.outputs.should_run == 'true'
        run: |
          echo "# Dynamically Varied Update" > README.md
          echo "Last updated on: $(date -u +'%Y-%m-%d %T') UTC" >> README.md

      - name: Commit and Push changes
        if: steps.gatekeeper.outputs.should_run == 'true'
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          
          git add README.md
          git diff-index --quiet HEAD || git commit -m "docs: dynamic auto-update README"
          git push
