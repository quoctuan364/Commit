name: Daily README Auto-Update

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite README content
        run: |
          echo "# Daily Update" > README.md
          echo "Last updated on: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" >> README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          
          git add README.md
          # Only commit if there are actual changes to avoid workflow errors
          git diff-index --quiet HEAD || git commit -m "docs: auto-update README to current day"
          git push
