name: Randomly Twice a Day README Update

on:
  schedule:
    # Runs twice a day: at 00:00 and 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows manual testing

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deciding to commit
        id: gatekeeper
        run: |
          # Get the current hour in UTC to know which run this is
          HOUR=$(date -u +"%H")
          
          if [ "$HOUR" -eq "00" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "☀️ First run of the day: Always executing."
          else
            # 50/50 chance for the second run (0 or 1)
            ROLL=$((RANDOM % 2))
            if [ $ROLL -eq 0 ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "🎲 Second run rolled SUCCESS: Executing."
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "💤 Second run rolled SKIP: Skipping this commit."
            fi
          fi

      - name: Overwrite README content with Date and Time
        if: steps.gatekeeper.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "# Dynamically Varied Update" > README.md
          echo "Last updated on: $(date -u +'%Y-%m-%d %T') UTC" >> README.md

      - name: Commit and Push changes
        if: steps.gatekeeper.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          
          git add README.md
          git diff-index --quiet HEAD || git commit -m "docs: dynamic auto-update README"
          git push
